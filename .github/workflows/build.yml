name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build ForzaTelemetrySplitter.sln -c Release

      - name: Verify engine (headless)
        run: dotnet run --project tests/EngineTest -c Release

      - name: Publish single-file exe
        run: dotnet publish src/ForzaTelemetrySplitter -c Release -r win-x64 -o publish

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ForzaTelemetrySplitter.iss
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ForzaTelemetrySplitter
          path: |
            publish/ForzaTelemetrySplitter.exe
            publish/ForzaTelemetrySplitterSetup.exe

      # On a version tag, attach both the portable exe and the installer to a GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/ForzaTelemetrySplitter.exe
            publish/ForzaTelemetrySplitterSetup.exe
