name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# The release step needs write access to create/attach release assets. Without this the
# GITHUB_TOKEN is read-only and "Attach to release" fails with "Resource not accessible by
# integration". Only matters on tag pushes; harmless otherwise.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Third-party actions are pinned to full commit SHAs (with the version in a comment) so a
      # re-tagged/compromised action can't silently enter the release build.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build ForzaTelemetrySplitter.sln -c Release

      - name: Verify engine (headless)
        run: dotnet run --project tests/EngineTest -c Release

      - name: Publish single-file exe
        run: dotnet publish src/ForzaTelemetrySplitter -c Release -r win-x64 -o publish

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup --version=6.4.2 --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ForzaTelemetrySplitter.iss
        shell: pwsh

      # Name the released portable build ftsPortable.exe (abbreviated/low-profile so the installer
      # reads as the recommended download). The internal assembly name is unchanged.
      - name: Prepare release artifacts
        run: Copy-Item publish/ForzaTelemetrySplitter.exe publish/ftsPortable.exe -Force
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ForzaTelemetrySplitter
          path: |
            publish/ForzaTelemetrySplitterInstaller.exe
            publish/ftsPortable.exe

      # Release ONLY on a version tag. CI builds fresh and creates/populates the GitHub Release —
      # do not also create releases manually (that caused asset-clobber/auth conflicts). A normal
      # push to main never touches releases.
      - name: Create release and attach assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          fail_on_unmatched_files: true
          files: |
            publish/ForzaTelemetrySplitterInstaller.exe
            publish/ftsPortable.exe
