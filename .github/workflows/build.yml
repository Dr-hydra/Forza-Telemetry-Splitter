name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build ForzaTelemetrySplitter.sln -c Release

      - name: Verify engine (headless)
        run: dotnet run --project tests/EngineTest -c Release

      - name: Publish single-file exe
        run: dotnet publish src/ForzaTelemetrySplitter -c Release -r win-x64 -o publish

      # --- Code signing (optional, gated) -------------------------------------------------
      # Signing only runs when the repo has a SignPath API token secret. Until then, every
      # step below is skipped and the workflow stays green (forks/PRs included).
      # See docs/CODE-SIGNING.md for how to enable it once SignPath approves the project.
      - name: Detect signing availability
        id: signing
        shell: pwsh
        run: |
          $enabled = -not [string]::IsNullOrEmpty($env:SIGNPATH_API_TOKEN)
          "enabled=$($enabled.ToString().ToLower())" >> $env:GITHUB_OUTPUT
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

      - name: Sign the app exe (SignPath)
        if: steps.signing.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: forza-telemetry-splitter
          signing-policy-slug: release-signing
          artifact-configuration-slug: app-exe
          github-artifact-id: ${{ github.run_id }}
          wait-for-completion: true
          output-artifact-directory: publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      # Build the installer. /DSign tells the .iss to sign the installer + uninstaller; only
      # passed when signing is enabled (the exe it bundles is already signed at this point).
      - name: Build installer (signed)
        if: steps.signing.outputs.enabled == 'true'
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DSign installer\ForzaTelemetrySplitter.iss'
        shell: pwsh

      - name: Build installer (unsigned)
        if: steps.signing.outputs.enabled != 'true'
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ForzaTelemetrySplitter.iss'
        shell: pwsh

      - name: Sign the installer (SignPath)
        if: steps.signing.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: forza-telemetry-splitter
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer-exe
          github-artifact-id: ${{ github.run_id }}
          wait-for-completion: true
          output-artifact-directory: publish
      # ------------------------------------------------------------------------------------

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ForzaTelemetrySplitter
          path: |
            publish/ForzaTelemetrySplitter.exe
            publish/ForzaTelemetrySplitterSetup.exe

      # On a version tag, attach both the portable exe and the installer to a GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/ForzaTelemetrySplitter.exe
            publish/ForzaTelemetrySplitterSetup.exe
